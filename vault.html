<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy - Study Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .file-card { animation: fadeIn 0.4s ease forwards; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(203, 213, 225, 0.6); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(51, 65, 85, 0.5); }
        #dropZone.drag-over { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); transform: scale(1.02); }
        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); display: none; animation: slideUp 0.3s ease-out; z-index: 10000; }
        #loader { position: fixed; inset: 0; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .dark #loader { background: #0b1120; }
        .hide-loader { opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0b1120] text-slate-900 dark:text-slate-200 min-h-screen p-4 md:p-8 transition-colors duration-500">

    <div id="loader">
        <h2 class="text-slate-900 dark:text-white text-xl font-bold">Opening Vault...</h2>
    </div>

    <div id="toast" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg" class="font-bold text-sm">File uploaded successfully</span>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="window.location.href='dash3.html'" class="flex items-center gap-2 text-slate-500 dark:text-slate-400 hover:text-blue-500 font-bold uppercase text-xs tracking-widest transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </button>
            <button onclick="toggleDarkMode()" class="p-3 rounded-xl bg-white dark:bg-slate-800 text-yellow-500 border border-slate-200 dark:border-slate-700 hover:scale-110 transition">
                <i id="theme-icon" class="fa-solid fa-sun"></i>
            </button>
        </div>

        <header class="mb-12">
            <h1 class="text-4xl font-black text-slate-900 dark:text-white tracking-tighter mb-6">Study <span class="text-blue-600">Vault</span></h1>
            <div class="relative max-w-md">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Search your documents..." 
                       class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass-card rounded-[30px] p-8 sticky top-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-sm font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest">Add New File</h2>
                        <button onclick="clearVault()" class="text-[10px] font-bold text-red-400 hover:text-red-500 uppercase tracking-tighter transition">Clear All</button>
                    </div>
                    <div id="dropZone" class="border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-2xl p-8 flex flex-col items-center justify-center text-center transition cursor-pointer">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-400 mb-4"></i>
                        <p class="text-xs font-medium text-slate-500">Drag files here or click to browse</p>
                        <input type="file" id="fileInput" class="hidden">
                    </div>
                    <div id="uploadStatus" class="mt-6 hidden">
                        <div class="flex justify-between text-[10px] font-bold mb-2 text-blue-500">
                            <span id="uploadFileName" class="truncate w-32"></span>
                            <span id="uploadPct">0%</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-800 h-1.5 rounded-full overflow-hidden">
                            <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="fileGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                <div id="emptyState" class="hidden text-center py-20">
                    <i class="fa-solid fa-folder-open text-5xl text-slate-300 mb-4"></i>
                    <p class="text-slate-500 font-medium">Your vault is empty. Upload some study materials!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allFiles = JSON.parse(localStorage.getItem('studyVaultFiles')) || [];
        const fileGrid = document.getElementById('fileGrid');
        const searchInput = document.getElementById('searchInput');

        // Initial Load
        window.onload = () => {
            renderFiles(allFiles);
            setupUpload();
            setTimeout(() => {
                document.getElementById('loader').classList.add('hide-loader');
            }, 800);
        };

        function renderFiles(files) {
            fileGrid.innerHTML = '';
            const emptyState = document.getElementById('emptyState');
            
            if (files.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            files.forEach((file, index) => {
                const isImage = file.type?.includes('image');
                const isPDF = file.type?.includes('pdf');
                const icon = isImage ? 'fa-image' : isPDF ? 'fa-file-pdf' : 'fa-file-lines';
                const iconColor = isImage ? 'text-purple-500' : isPDF ? 'text-red-500' : 'text-blue-500';
                
                fileGrid.innerHTML += `
                    <div class="glass-card p-5 rounded-3xl file-card group hover:shadow-xl">
                        <div class="flex items-start justify-between mb-4">
                            <div class="w-12 h-12 bg-${isImage ? 'purple' : isPDF ? 'red' : 'blue'}-500/10 rounded-xl flex items-center justify-center">
                                <i class="fa-solid ${icon} ${iconColor} text-xl"></i>
                            </div>
                            <button onclick="deleteFile(${index})" class="p-2 text-slate-300 hover:text-red-500 transition">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                        <h3 class="font-bold text-sm truncate mb-1 text-slate-800 dark:text-white" title="${file.name}">${file.name}</h3>
                        <p class="text-[10px] font-bold text-slate-400 mb-4 uppercase tracking-tighter">${file.size}</p>
                        <a href="${file.data}" download="${file.name}" class="block w-full text-center bg-blue-600 text-white hover:bg-blue-700 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition shadow-lg shadow-blue-500/20">Download</a>
                    </div>
                `;
            });
        }

        function setupUpload() {
            const zone = document.getElementById('dropZone');
            const input = document.getElementById('fileInput');

            zone.onclick = () => input.click();
            ['dragenter', 'dragover'].forEach(n => zone.addEventListener(n, (e) => { e.preventDefault(); zone.classList.add('drag-over'); }));
            ['dragleave', 'drop'].forEach(n => zone.addEventListener(n, (e) => { e.preventDefault(); zone.classList.remove('drag-over'); }));
            
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                handleUpload(e.dataTransfer.files[0]);
            });
            input.onchange = (e) => handleUpload(e.target.files[0]);
        }

        function handleUpload(file) {
            if (!file) return;

            // Check file size (2MB limit for localStorage)
            if (file.size > 2 * 1024 * 1024) {
                alert("⚠️ File too large!\n\nBrowser storage has a 2MB limit per file.\nPlease upload files under 2MB or consider using cloud storage.");
                return;
            }

            const status = document.getElementById('uploadStatus');
            const progress = document.getElementById('progressBar');
            status.classList.remove('hidden');
            document.getElementById('uploadFileName').innerText = file.name;

            const reader = new FileReader();
            
            reader.onprogress = (e) => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    progress.style.width = pct + '%';
                    document.getElementById('uploadPct').innerText = pct + '%';
                }
            };

            reader.onload = (e) => {
                const fileData = {
                    name: file.name,
                    size: formatBytes(file.size),
                    type: file.type,
                    data: e.target.result,
                    uploadedAt: new Date().toISOString()
                };

                try {
                    allFiles.push(fileData);
                    localStorage.setItem('studyVaultFiles', JSON.stringify(allFiles));
                    setTimeout(() => {
                        status.classList.add('hidden');
                        showToast("✓ File uploaded successfully");
                        renderFiles(allFiles);
                        document.getElementById('fileInput').value = ''; // Reset input
                    }, 500);
                } catch (err) {
                    alert("⚠️ Storage full!\n\nYour browser's storage is full. Try deleting some files first.");
                    allFiles.pop();
                    status.classList.add('hidden');
                }
            };

            reader.readAsDataURL(file);
        }

        function deleteFile(index) {
            if(confirm(`Delete "${allFiles[index].name}"?`)) {
                allFiles.splice(index, 1);
                localStorage.setItem('studyVaultFiles', JSON.stringify(allFiles));
                renderFiles(allFiles);
                showToast("File deleted");
            }
        }

        function clearVault() {
            if(confirm("⚠️ Are you sure you want to delete ALL files?\n\nThis cannot be undone.")) {
                allFiles = [];
                localStorage.removeItem('studyVaultFiles');
                renderFiles(allFiles);
                showToast("Vault cleared");
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return parseFloat((bytes / Math.pow(1024, i)).toFixed(1)) + ' ' + ['Bytes', 'KB', 'MB', 'GB'][i];
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderFiles(allFiles.filter(f => f.name.toLowerCase().includes(term)));
        });

        window.toggleDarkMode = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        };

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.classList.toggle('dark', savedTheme === 'dark');
        document.getElementById('theme-icon').className = savedTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    </script>
    
    <script src="global.js"></script>
</body>
</html>
